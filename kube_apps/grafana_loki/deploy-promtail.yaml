apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail-daemonset
  namespace: loki
spec:
  selector:
    matchLabels:
      name: promtail
  template:
    metadata:
      labels:
        name: promtail
    spec:
      serviceAccount: promtail-serviceaccount
      serviceAccountName: promtail-serviceaccount
      securityContext:
        runAsUser: 0
        runAsGroup: 0
      containers:
        - name: promtail-container
          image: grafana/promtail:2.5.0
          args: ["-config.file", "/etc/promtail/config.yml"]
          ports:
            - name: http-metrics
              containerPort: 3200
              protocol: TCP
          env: 
            - name: 'HOSTNAME' # needed when using kubernetes_sd_configs
              valueFrom:
                fieldRef:
                  fieldPath: 'spec.nodeName'
          volumeMounts:
            - name: promtail-conf
              mountPath: /etc/promtail/config.yml
              subPath: config.yml
            - name: pods
              mountPath: /var/log/pod
              readOnly: true
            - name: containers
              mountPath: /var/lib/docker/containers
              readOnly: true
      volumes:
        - name: promtail-conf
          configMap:
            name: promtail-config
        - name: pods
          hostPath:
            path: /var/log/pods
        - name: containers
          hostPath:
            path: /var/lib/docker/containers
