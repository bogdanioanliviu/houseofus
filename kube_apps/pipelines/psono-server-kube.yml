# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
 paths:
   include:
     - kube_apps/psono/deploy-psono.yaml

pool:
  name: Default

steps:  

- task: replacetokens@3
  displayName: 'Update manifests'
  inputs:
    rootDirectory: '$(System.DefaultWorkingDirectory)/kube_apps/psono/'
    targetFiles: 'deploy-psono.yaml'
    encoding: 'auto'
    writeBOM: true
    actionOnMissing: 'warn'
    keepToken: true
    actionOnNoFiles: 'fail'
    enableTransforms: false
    tokenPrefix: '{'
    tokenSuffix: '}'
    enableRecursion: false
    useLegacyPattern: false
    enableTelemetry: true
    
- task: Bash@3
  inputs:
    targetType: 'inline'
    script: 'kubectl apply -f $(System.DefaultWorkingDirectory)/kube_apps/psono/deploy-psono.yaml'
    failOnStderr: true
    noProfile: false
  displayName: "Deploy new img."

- task: Bash@3
  inputs:
    targetType: 'inline'
    script: 'kubectl -n psono rollout restart deployment psono-nginx-proxy'
    failOnStderr: true
    noProfile: false
  displayName: 'Restart psono nginx.'

