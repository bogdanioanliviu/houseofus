# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
 paths:
   include:
     - kube_apps/nextcloud/*

pool:
  name: Default

steps:
- task: replacetokens@3
  displayName: 'Update manifests'
  inputs:
    rootDirectory: '$(System.DefaultWorkingDirectory)/kube_apps/nextcloud/'
    targetFiles: '**/*.yaml'
    encoding: 'auto'
    writeBOM: true
    actionOnMissing: 'warn'
    keepToken: true
    actionOnNoFiles: 'fail'
    enableTransforms: false
    tokenPrefix: '{'
    tokenSuffix: '}'
    enableRecursion: false
    useLegacyPattern: false
    enableTelemetry: true

- task: Bash@3
  inputs:
    filePath: '$(System.DefaultWorkingDirectory)/kube_apps/nextcloud/download_img_yq.sh'
    failOnStderr: true
    noProfile: false
  displayName: "Generate env var with new img name."
    
- task: Ansible@0
  inputs:
    ansibleInterface: 'agentMachine'
    playbookPathOnAgentMachine: '/home/bil/ansible/playbooks/download_img_ha.yml'
    inventoriesAgentMachine: 'noInventory'
    args: '--extra-vars "ha_img=$(nextcloud_img) tele_token=$(telegram-token)"'
  env:
    nextcloud_img : $(nextcloud_img)
  displayName: "Download $(nextcloud_img) ha img to knodes."

- task: Bash@3
  inputs:
    targetType: 'inline'
    script: 'kubectl apply -f $(System.DefaultWorkingDirectory)/kube_apps/nextcloud/deploy-nextcloud.yaml'
    failOnStderr: true
    noProfile: false
