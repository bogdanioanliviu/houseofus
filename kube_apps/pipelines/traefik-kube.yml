trigger:
  paths:
    include:
      - kube_apps/traeffik/configmap-trafik.yaml
      - kube_apps/traeffik/deploy-traefik.yaml
      - kube_apps/traeffik/service-account.yaml
      - kube_apps/traeffik/svc-trafik-all.yaml

pool:
  name: Default

steps:

- task: replacetokens@3
  displayName: 'Update manifests'
  inputs:
    rootDirectory: '$(System.DefaultWorkingDirectory)/kube_apps/traeffik/'
    targetFiles: '**/*.yaml'
    encoding: 'auto'
    writeBOM: true
    actionOnMissing: 'warn'
    keepToken: true
    actionOnNoFiles: 'fail'
    enableTransforms: false
    tokenPrefix: '{!'
    tokenSuffix: '!}'
    enableRecursion: false
    useLegacyPattern: false
    enableTelemetry: true

- task: Bash@3
  inputs:
    targetType: 'inline'
    script: |
      kubectl delete -f $(System.DefaultWorkingDirectory)/kube_apps/traeffik/deploy-traefik.yaml
      kubectl delete -f $(System.DefaultWorkingDirectory)/kube_apps/traeffik/pv-pvc.yaml
    failOnStderr: true
    noProfile: false
  displayName: "Remove old version of pv-pvc."

- task: Bash@3
  inputs:
    targetType: 'inline'
    script: |
      kubectl apply -f ./kube_apps/traeffik/cdr-trafik.yaml
      kubectl apply -f ./kube_apps/traeffik/pv-pvc.yaml
      kubectl apply -f ./kube_apps/traeffik/configmap-trafik.yaml
      kubectl apply -f ./kube_apps/traeffik/service-account.yaml
      kubectl apply -f ./kube_apps/traeffik/svc-trafik-all.yaml
      kubectl apply -f ./kube_apps/traeffik/deploy-traefik.yaml
    failOnStderr: true
    noProfile: false
