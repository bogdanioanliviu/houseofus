# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
 paths:
   include:
     - kube_apps/postgres15/*

pool:
  name: Default

steps:  

- task: Bash@3
  displayName: 'delete postgres'
  inputs:
    targetType: 'inline'
    script: | 
      kubectl delete -f $(System.DefaultWorkingDirectory)/kube_apps/postgres15/deploy-postgres.yaml
      kubectl delete -f $(System.DefaultWorkingDirectory)/kube_apps/postgres15/pv-pvc.yaml
    failOnStderr: true
    noProfile: false

- task: replacetokens@3
  displayName: 'Prepare manifests'
  inputs:
    rootDirectory: '$(System.DefaultWorkingDirectory)/kube_apps/postgres15/'
    targetFiles: '**/*.yaml'
    encoding: 'auto'
    writeBOM: true
    actionOnMissing: 'warn'
    keepToken: true
    actionOnNoFiles: 'fail'
    enableTransforms: false
    tokenPrefix: '{'
    tokenSuffix: '}'
    enableRecursion: false
    useLegacyPattern: false
    enableTelemetry: true
- task: Bash@3
  displayName: 'deploy secrets'
  inputs:
    targetType: 'inline'
    script: 'kubectl apply -f $(System.DefaultWorkingDirectory)/kube_apps/postgres15/secrets.yaml'
    failOnStderr: true
    noProfile: false
- task: Bash@3
  displayName: 'deploy postgres'
  inputs:
    targetType: 'inline'
    script: |
      kubectl apply -f $(System.DefaultWorkingDirectory)/kube_apps/postgres15/pv-pvc.yaml
      kubectl apply -f $(System.DefaultWorkingDirectory)/kube_apps/postgres15/deploy-postgres.yaml
    failOnStderr: true
    noProfile: false
