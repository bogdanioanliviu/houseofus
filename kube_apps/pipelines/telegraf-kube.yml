# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
 paths:
   include:
     - kube_apps/tig/deploy-telegraf.yaml

pool:
  name: Default

steps:
- task: replacetokens@3
  displayName: 'Update manifests'
  inputs:
    rootDirectory: '$(System.DefaultWorkingDirectory)/kube_apps/tig/'
    targetFiles: 'deploy-telegraf.yaml'
    encoding: 'auto'
    writeBOM: true
    actionOnMissing: 'warn'
    keepToken: true
    actionOnNoFiles: 'fail'
    enableTransforms: false
    tokenPrefix: '{'
    tokenSuffix: '}'
    enableRecursion: false
    useLegacyPattern: false
    enableTelemetry: true
- task: Bash@3
  inputs:
    targetType: 'inline'
    script: |
      kubectl delete -f $(System.DefaultWorkingDirectory)/kube_apps/tig/deploy-telegraf.yaml
      kubectl delete -f $(System.DefaultWorkingDirectory)/kube_apps/tig/pv-pvc-telegraf.yaml
    failOnStderr: true
    noProfile: false

- task: Bash@3
  inputs:
    targetType: 'inline'
    script: |
      kubectl apply -f $(System.DefaultWorkingDirectory)/kube_apps/tig/pv-pvc-telegraf.yaml
      kubectl apply -f $(System.DefaultWorkingDirectory)/kube_apps/tig/deploy-telegraf.yaml
    failOnStderr: true
    noProfile: false
