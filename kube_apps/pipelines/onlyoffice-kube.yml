# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
 paths:
   include:
     - kube_apps/onlyoffice/*

pool:
  name: Default

steps:
- task: Bash@3
  inputs:
    filePath: '$(System.DefaultWorkingDirectory)/kube_apps/onlyoffice/template_yq.sh'
    failOnStderr: true
    noProfile: false
  env:
    JWT_SECRET: $(JWT-SECRET-onlyoffice)
    DB_USER_onlyoffice: $(DB-USER-onlyoffice)
    DB_PWD_onlyoffice: $(DB-PWD-onlyoffice)
    
- task: Ansible@0
  inputs:
    ansibleInterface: 'agentMachine'
    playbookPathOnAgentMachine: '/home/bil/ansible/playbooks/download_img_ha.yml'
    inventoriesAgentMachine: 'noInventory'
    args: '--extra-vars "ha_img=$(onlyoffice_img) tele_token=$(telegram-token)"'
  env:
    onlyoffice_img : $(onlyoffice_img)
  displayName: "Download $(onlyoffice_img) ha img to knodes."

- task: Bash@3
  inputs:
    targetType: 'inline'
    script: 'kubectl apply -f $(System.DefaultWorkingDirectory)/kube_apps/onlyoffice/deploy-onlyoffice.yaml'
    failOnStderr: true
    noProfile: false
