# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
 paths:
   include:
     - kube_apps/psono/cron-psono.yaml

pool:
  name: Default

steps:  

- task: Bash@3
  inputs:
    targetType: 'inline'
    script: 'kubectl -n psono rollout restart deployment psono'
    failOnStderr: true
    noProfile: false
  displayName: 'Update psono server.'
- task: Bash@3
  inputs:
    targetType: 'inline'
    script: 'kubectl -n psono rollout restart deployment psono-client'
    failOnStderr: true
    noProfile: false
  displayName: 'Update psono client.'
- task: Bash@3
  inputs:
    targetType: 'inline'
    script: 'kubectl -n psono rollout restart deployment psono-admin'
    failOnStderr: true
    noProfile: false
  displayName: 'Update psono admin.'
- task: Bash@3
  inputs:
    targetType: 'inline'
    script: 'kubectl -n psono rollout restart deployment psono-nginx-proxy'
    failOnStderr: true
    noProfile: false
  displayName: 'Update psono nginx.'
