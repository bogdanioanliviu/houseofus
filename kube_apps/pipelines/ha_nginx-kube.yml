# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
 paths:
   include:
     - kube_apps/ha_nginx/deploy-ha_nginx.yaml

pool:
  name: Default

steps:  

- task: Bash@3
  inputs:
    filePath: '$(System.DefaultWorkingDirectory)/kube_apps/ha_nginx/download_img_yq.sh'
    arguments: 'deploy-ha_nginx.yaml'
    failOnStderr: true
    noProfile: false
  displayName: "Generate env var with new img name."

- task: Ansible@0
  inputs:
    ansibleInterface: 'agentMachine'
    playbookPathOnAgentMachine: '/home/bil/ansible/playbooks/download_img_ha.yml'
    inventoriesAgentMachine: 'noInventory'
    args: '--extra-vars "ha_img=$(ha_img) tele_token=$(telegram-token)"'
  env:
    ha_img : $(ha_img)
  displayName: "Download new ha nginx img to knodes."

- task: Bash@3
  inputs:
    targetType: 'inline'
    script: 'kubectl apply -f $(System.DefaultWorkingDirectory)/kube_apps/ha_nginx/deploy-ha_nginx.yaml'
    failOnStderr: true
    noProfile: false
  displayName: "Deploy new img."
