apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: pulse-ingresscdr
  namespace: pulse

spec:
  entryPoints:
    - websecure

  routes:
  - kind: Rule
    match: Host(`pulse.houseofus.eu`)
    services:
    - kind: Service
      name: pulse
      port: 7655
      namespace: pulse
      scheme: http
      serversTransport: pulse-transport
      #sticky:
      #  cookie:
      #    name: nc_session_id
  tls:
    certResolver: file

---
apiVersion: traefik.io/v1alpha1
kind: ServersTransport
metadata:
  name: pulse-transport
  namespace: pulse

spec:
    insecureSkipVerify: true
    serverName: "pulse"
---
apiVersion: traefik.io/v1alpha1
kind: TLSOption
metadata:
  name: pulse-tls
  namespace: pulse

spec:
  minVersion: VersionTLS12
  maxVersion: VersionTLS13
  curvePreferences:
    - CurveP521
    - CurveP384
  cipherSuites:
    - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305_SHA256
    - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
    - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
