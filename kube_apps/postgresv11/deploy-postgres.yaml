apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres11
  namespace: postgres11
  labels:
    app: postgres11
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres11
  template:
    metadata:
      labels:
        app: postgres11
      annotations:
        diun.enable: "true"
        diun.watch_repo: "true"
    spec:
      containers:
        - name: postgres11
          image: postgres:11.17-alpine3.16
          imagePullPolicy: "Always"
          resources:
            limits:
              memory: 600Mi
              cpu: "0.20"
            requests:
              memory: 100Mi
              cpu: "0.01"
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: postgres11-secret
          volumeMounts:
            - mountPath: /var/lib/postgresql/data
              name: postgredb
      volumes:
        - name: postgredb
          persistentVolumeClaim:
            claimName: pvc-postgres11