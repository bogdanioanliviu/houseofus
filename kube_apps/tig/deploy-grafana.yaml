apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: tig
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: grafana
  minReadySeconds: 5
  template:
    metadata:
      labels:
        app: grafana
      annotations:
        diun.enable: "true"
        diun.watch_repo: "true"
        diun.include_tags: "latest"
    spec:
      securityContext:
        runAsUser: 977
        runAsGroup: 988
        fsGroup: 988
        supplementalGroups: [ 0 ]
      containers:
        - name: grafana
          securityContext:
            runAsUser: 977
          image: grafana/grafana:13.1.0-ubuntu
          imagePullPolicy: "IfNotPresent"
          resources:
            limits:
              memory: "1024Mi"
            requests:
              memory: "380Mi"
              cpu: "500m"
          env:
            - name: TZ
              value: "Europe/Madrid"
            - name: GF_INSTALL_PLUGINS
              value: novatec-sdg-panel, grafana-clock-panel
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: {Grafana-Admin-Pass}
            - name: GF_SERVER_ROOT_URL
              value: "https://grafana.houseofus.eu"
          ports:
            - containerPort: 3000
              protocol: TCP
              name: http
          volumeMounts:
            - mountPath: /var/lib/grafana
              name: grafana-volume
              subPath: data/
            -  mountPath: /etc/grafana/provisioning
               name: grafana-volume
               subPath: provisioning/
            - mountPath: /etc/grafana/grafana.ini
              name: grafana-volume
              subPath: grafana.ini
              readOnly: true
      restartPolicy: Always
      volumes:
        - name: grafana-volume
          persistentVolumeClaim:
            claimName: pvc-grafana-unifi
