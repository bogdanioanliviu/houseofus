apiVersion: apps/v1
kind: Deployment
metadata:
  name: psono-client
  namespace: psono
  labels:
    app: psono-client
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: psono-client
  template:
    metadata:
      labels:
        app: psono-client
      annotations:
        diun.enable: "true"
        diun.watch_repo: "true"
    spec:
      containers:
        - name: psono-client
          image: psono/psono-client:1.26.1
          imagePullPolicy: "Always"
          resources:
            limits:
              memory: 60Mi
              cpu: "0.05"
            requests:
              memory: 30Mi
              cpu: "0.05"
          ports:
            - containerPort: 80
              protocol: TCP
              name: http
          volumeMounts:
            - mountPath: /usr/share/nginx/html/config.json
              name: psono
              subPath: config.json
      restartPolicy: Always
      volumes:
        - name: psono
          persistentVolumeClaim:
            claimName: pvc-psono