kind: Deployment
apiVersion: apps/v1
metadata:
  labels:
    app: ha-nginx
  name: ha-nginx
  namespace: home-assist
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: ha-nginx
  template:
    metadata:
      labels:
        app: ha-nginx
      annotations:
        diun.enable: "true"
        diun.watch_repo: "true"
    spec:
      containers:
        - name: ha-nginx
          image: linuxserver/nginx:1.20.1
          imagePullPolicy: "Always"
          resources:
            limits:
              memory: 100Mi
              cpu: "0.40"
            requests:
              memory: 64Mi
              cpu: "0.40"
          env:
            - name: TZ
              value: Europe/Madrid
          ports:
            - containerPort: 80
              protocol: TCP
              name: http
            - containerPort: 443
              protocol: TCP
              name: https
          volumeMounts:
            - mountPath: /config
              name: ha-nginx
      restartPolicy: Always
      volumes:
        - name: ha-nginx
          persistentVolumeClaim:
            claimName: pvc-ha-nginx
      