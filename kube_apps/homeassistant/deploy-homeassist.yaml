kind: Deployment
apiVersion: apps/v1
metadata:
  labels:
    app: homeassist
  name: homeassist
  namespace: home-assist
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: homeassist
  template:
    metadata:
      labels:
        app: homeassist
      annotations:
        diun.enable: "true"
        diun.watch_repo: "true"
        diun.include_tags: "2023.12.*;2024.01.*"
    spec:
      initContainers:
        - name: check-db-ready
          image: postgres:15.4-alpine3.18
          command: [ 'sh', '-c',
            'until pg_isready -h postgres15.postgres.svc.cluster.local -p 5432; 
            do echo waiting for database; sleep 2; done;' ]
      containers:
        - name: homeassist
          image: ghcr.io/home-assistant/home-assistant:2023.12.0
          imagePullPolicy: "IfNotPresent"
          resources:
            limits:
              memory: 512Mi
              cpu: "0.50"
            requests:
              memory: 256Mi
              cpu: "0.20"
          env:
            - name: TZ
              value: Europe/Madrid
          ports:
            - containerPort: 8123
              protocol: TCP
              name: http
          volumeMounts:
            - name: ha-data
              mountPath: /config
      restartPolicy: Always
      volumes:
        - name: ha-data
          persistentVolumeClaim:
            claimName: pvc-homeassist