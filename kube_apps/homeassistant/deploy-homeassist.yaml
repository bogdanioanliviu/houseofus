kind: Deployment
apiVersion: apps/v1
metadata:
  labels:
    app: homeassist
  name: homeassist
  namespace: home-assist
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: homeassist
  template:
    metadata:
      labels:
        app: homeassist
      annotations:
        diun.enable: "true"
        diun.watch_repo: "true"
    spec:
      containers:
        - name: homeassist
          image: homeassistant/home-assistant:2021.12.6
          imagePullPolicy: "IfNotPresent"
          resources:
            limits:
              memory: 1024Mi
              cpu: "0.40"
            requests:
              memory: 230Mi
              cpu: "0.40"
          env:
            - name: TZ
              value: Europe/Madrid
          ports:
            - containerPort: 8123
              protocol: TCP
              name: http
            - containerPort: 9000
              protocol: TCP
              name: occp
          volumeMounts:
            - name: ha-data
              mountPath: /config
      restartPolicy: Always
      volumes:
        - name: ha-data
          persistentVolumeClaim:
            claimName: pvc-homeassist