apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: diun
  name: diun
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: diun
  template:
    metadata:
      labels:
        app: diun
      annotations:
        diun.enable: "true"
        diun.watch_repo: "true"
    spec:
      serviceAccountName: diun
      containers:
        - name: diun
          image: crazymax/diun:4.21.0
          imagePullPolicy: "IfNotPresent"
          resources:
            limits:
              memory: 150Mi
              cpu: "0.04"
            requests:
              memory: 60Mi
              cpu: "0.02"
          env:
            - name: TZ
              value: "Europe/Madrid"
            - name: LOG_LEVEL
              value: "info"
            - name: LOG_JSON
              value: "false"
            - name: DIUN_WATCH_WORKERS
              value: "10"
            - name: DIUN_WATCH_SCHEDULE
              value: "0 */6 * * *"
            - name: DIUN_NOTIF_TELEGRAM_TOKEN
              value: "telegram-token"
            - name: DIUN_NOTIF_TELEGRAM_CHATIDS
              value: "-320842825"
            - name: DIUN_PROVIDERS_KUBERNETES
              value: "true"
            - name: PROVIDERS_KUBERNETES_NAMESPACES
              value: default,nextcloud,gandi-dns,postgres,postgres11,onlyoffice,psono
          volumeMounts:
            - mountPath: "/data"
              name: "data"
      restartPolicy: Always
      volumes:
        # Set up a data directory for diun
        # For production usage, you should consider using PV/PVC instead(or simply using storage like NAS)
        # For more details, please see https://kubernetes.io/docs/concepts/storage/volumes/
        - name: "data"
          persistentVolumeClaim:
            claimName: pvc-diun
