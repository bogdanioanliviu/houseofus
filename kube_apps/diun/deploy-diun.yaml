apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: diun
  name: diun
spec:
  replicas: 1
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      app: diun
  template:
    metadata:
      labels:
        app: diun
      annotations:
        diun.enable: "true"
        diun.watch_repo: "true"
    spec:
      serviceAccountName: diun
      containers:
        - name: diun
          image: crazymax/diun:4.22.0
          imagePullPolicy: "IfNotPresent"
          resources:
            limits:
              memory: 150Mi
              cpu: "0.04"
            requests:
              memory: 60Mi
              cpu: "0.02"
          env:
            - name: TZ
              value: "Europe/Madrid"
            - name: LOG_LEVEL
              value: "info"
            - name: LOG_JSON
              value: "false"
            - name: DIUN_WATCH_COMPAREDIGEST
              value: "true"
            - name: DIUN_WATCH_WORKERS
              value: "10"
            - name: DIUN_WATCH_SCHEDULE
              value: "0 */6 * * *"
            - name: DIUN_NOTIF_TELEGRAM_TOKEN
              value: "{telegram-token-houseofus}"
            - name: DIUN_NOTIF_TELEGRAM_CHATIDS
              value: "-320842825"
            - name: DIUN_PROVIDERS_KUBERNETES
              value: "true"
            - name: PROVIDERS_KUBERNETES_NAMESPACES
              value: default,nextcloud,gandi-dns,postgres,postgres11,onlyoffice,psono
            - name: DIUN_REGOPTS_DOCKER_NAME
              value: "docker.io"
            - name: DIUN_REGOPTS_DOCKER_SELECTOR
              value: 'image'
            - name: DIUN_REGOPTS_DOKER_USERNAME
              value: '{docker-user}'
            - name: DIUN_REGOPTS_DOCKER_PASSWORD
              value: "{docker-pass}"
          volumeMounts:
            - mountPath: "/data"
              name: "data"
            - name: "container"
              mountPath: "/var/run/containerd/containerd.sock"
      restartPolicy: Always
      volumes:
        - name: "data"
          persistentVolumeClaim:
            claimName: pvc-diun
        - name: container
          hostPath:
            path: /var/run/containerd/containerd.sock
