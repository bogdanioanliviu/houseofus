kind: PersistentVolume
apiVersion: v1
metadata:
  name: pv-diun
  namespace: diun
  labels:
    app: diun
    type: nfs
spec:
  storageClassName: managed-nfs-storage
  capacity:
    storage: 100Mi
  accessModes:
    - ReadWriteOnce
  nfs:
    path: /mnt/pool1/nfskube/diun
    server: truenas.houseofus.eu