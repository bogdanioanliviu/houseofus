apiVersion: apps/v1
kind: Deployment
metadata:
  name: nextcloud
  namespace: nextcloud
  labels:
    app: nextcloud
spec:
  replicas: 1
  revisionHistoryLimit: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      app: nextcloud
  template:
    metadata:
      labels:
        app: nextcloud
      annotations:
        diun.enable: "true"
        diun.watch_repo: "true"
        diun.include_tags: "26.*.*;27.0.*"
    spec:
      containers:
        - name: nextcloud
          image: linuxserver/nextcloud:26.0.2
          imagePullPolicy: "Always"
          resources:
            limits:
              memory: 1024Mi
              cpu: "0.50"
            requests:
              memory: 256Mi
              cpu: "0.50"
          ports:
            - containerPort: 443
              protocol: TCP
              name: https
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "Europe/Madrid"
            - name: REDIS_HOST
              value: haproxy.houseofus.eu
            - name: REDIS_PORT
              value: "30413"
            - name: REDIS_PASSWORD
              value: {redispass}
          volumeMounts:
            - mountPath: /config
              name: nextcloud-data
              subPath: nextcloud-config
            - mountPath: /data
              name: nextcloud-data
              subPath: nextcloud-data
      restartPolicy: Always
      volumes:
        - name: nextcloud-data
          persistentVolumeClaim:
            claimName: pvc-nextcloud